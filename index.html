<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EIC/ePIC GitHub Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --border:  #30363d;
      --text:    #e6edf3;
      --muted:   #8b949e;
      --blue:    #58a6ff;
      --orange:  #f0883e;
      --green:   #3fb950;
      --red:     #f85149;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      padding: 2rem 2.5rem;
      max-width: 1200px;
      margin: 0 auto;
    }
    a { color: var(--blue); text-decoration: none; }
    a:hover { text-decoration: underline; }
    header { margin-bottom: 2rem; }
    header h1 { font-size: 1.75rem; font-weight: 700; }
    header p { color: var(--muted); margin-top: 0.4rem; font-size: 0.95rem; }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
    }
    .stat-card .label {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 600;
    }
    .stat-card .value {
      font-size: 2.4rem;
      font-weight: 700;
      margin-top: 0.25rem;
      line-height: 1.1;
    }
    .stat-card .repo {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 0.35rem;
    }
    .chart-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.5rem 1.75rem;
      margin-bottom: 1.5rem;
    }
    .chart-section h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1.25rem;
      color: var(--text);
    }
    .chart-wrapper { position: relative; height: 300px; }
    .project-charts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }
    @media (max-width: 720px) {
      .project-charts { grid-template-columns: 1fr; }
    }
    .chart-subtitle {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 0.9rem;
    }
    footer {
      color: var(--muted);
      font-size: 0.8rem;
      text-align: right;
      margin-top: 0.5rem;
    }
    .stat-card .trend {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
      margin-left: 0.4rem;
    }
    .tab-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.25rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }
    .tab-btn {
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      margin-bottom: -1px;
      padding: 0.6rem 1rem;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      border-radius: 4px 4px 0 0;
      transition: color 0.15s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--text); }
    .repo-section { display: none; }
    .error-box {
      color: var(--red);
      background: rgba(248,81,73,0.08);
      border: 1px solid rgba(248,81,73,0.3);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

<header>
  <h1>🚀 EIC/ePIC GitHub Dashboard</h1>
  <p>
    Issue, pull-request, and commit trends for
    <a href="https://github.com/eic/epic">eic/epic</a>,
    <a href="https://github.com/eic/EICrecon">eic/EICrecon</a>,
    <a href="https://github.com/eic/containers">eic/containers</a>,
    <a href="https://github.com/eic/detector_benchmarks">eic/detector_benchmarks</a>, and
    <a href="https://github.com/eic/physics_benchmarks">eic/physics_benchmarks</a> —
    updated weekly via GitHub Actions.
  </p>
</header>

<nav id="tab-bar" class="tab-bar"></nav>
<div id="charts-container"></div>

<footer id="footer"></footer>

<script>
const REPO_COLORS = {
  'eic/epic':                  '#58a6ff',
  'eic/EICrecon':              '#f0883e',
  'eic/containers':            '#3fb950',
  'eic/detector_benchmarks':   '#a371f7',
  'eic/physics_benchmarks':    '#f78166',
};

const SCALE_OPTS = {
  x: { ticks: { color: '#8b949e', maxRotation: 45, autoSkip: true, maxTicksLimit: 14 },
       grid: { color: '#21262d' } },
  y: { ticks: { color: '#8b949e' },
       grid: { color: '#21262d' },
       beginAtZero: true },
};

function fmtDate(iso) {
  return new Date(iso + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

/**
 * Compare `current` against the average of the last `n` entries in `series`
 * (excluding the final entry which represents the current week).
 * Returns an HTML string like "↑ 6" or "↓ 3" in a muted style.
 */
function trendBadge(series, current, n = 5) {
  if (!series?.length || current == null) return '';
  const window = series.slice(-(n + 1), -1);
  if (!window.length) return '';
  const avg = window.reduce((a, b) => a + b, 0) / window.length;
  const delta = Math.round((current - avg) * 10) / 10;
  if (delta === 0) return '';
  const arrow = delta > 0 ? '↑' : '↓';
  return `<span class="trend">${arrow} ${Math.abs(delta).toLocaleString()}</span>`;
}

// Repos whose charts have been rendered (lazy — only when tab first shown).
const renderedTabs = new Set();
// Pending chart data keyed by repoId.
const pendingCharts = {};

function activateTab(repoId) {
  // Show/hide sections
  document.querySelectorAll('.repo-section').forEach(s => s.style.display = 'none');
  const section = document.getElementById(`section-${repoId}`);
  if (section) section.style.display = 'block';

  // Update tab button styles
  document.querySelectorAll('.tab-btn').forEach(btn => {
    const isActive = btn.dataset.repoId === repoId;
    btn.classList.toggle('active', isActive);
    btn.style.borderBottomColor = isActive ? btn.dataset.color : 'transparent';
    btn.style.color = isActive ? btn.dataset.color : '';
  });

  // Lazy-render charts the first time a tab is shown
  if (!renderedTabs.has(repoId) && pendingCharts[repoId]) {
    const { repo, d } = pendingCharts[repoId];
    buildChart(`${repoId}-issues-chart`, { [repo]: d }, 'open_issues');
    buildChart(`${repoId}-prs-chart`, { [repo]: d }, 'open_prs');
    if (d.commit_weeks?.length) buildCommitsChart(`${repoId}-commits-chart`, repo, d);
    renderedTabs.add(repoId);
  }

  localStorage.setItem('epic-dashboard-tab', repoId);
}

function buildDashboard(data) {
  const tabBar   = document.getElementById('tab-bar');
  const container = document.getElementById('charts-container');
  const repos = Object.entries(data).filter(([, d]) => d.dates?.length);

  for (const [repo, d] of repos) {
    const repoId = repo.replace(/\//g, '-');
    const color  = REPO_COLORS[repo] || '#58a6ff';
    const label  = repo.split('/')[1];   // drop the "eic/" prefix in the tab

    // Tab button
    const btn = document.createElement('button');
    btn.className = 'tab-btn';
    btn.textContent = label;
    btn.dataset.repoId = repoId;
    btn.dataset.color  = color;
    btn.addEventListener('click', () => activateTab(repoId));
    tabBar.appendChild(btn);

    // Section HTML (hidden until activated)
    container.insertAdjacentHTML('beforeend', `
      <div id="section-${repoId}" class="repo-section">
        <div class="chart-section">
          <h2>
            <a href="https://github.com/${repo}" style="color:${color}">${repo}</a>
            <span style="font-weight:400;color:var(--muted);font-size:0.8rem">&nbsp;— weekly snapshots, past 6 months</span>
          </h2>
          <div class="stats-grid" style="margin-bottom:1.25rem">
            <div class="stat-card">
              <div class="label">Open Issues</div>
              <div class="value" style="color:${color}">${(d.current_open_issues ?? '—').toLocaleString()}${trendBadge(d.open_issues, d.current_open_issues)}</div>
            </div>
            <div class="stat-card">
              <div class="label">Open Pull Requests</div>
              <div class="value" style="color:${color}">${(d.current_open_prs ?? '—').toLocaleString()}${trendBadge(d.open_prs, d.current_open_prs)}</div>
            </div>
            <div class="stat-card">
              <div class="label">Commits This Week</div>
              <div class="value" style="color:${color}">${(d.current_week_commits ?? '—').toLocaleString()}${trendBadge(d.commits_per_week, d.current_week_commits)}</div>
            </div>
          </div>
          <div class="project-charts">
            <div>
              <div class="chart-subtitle">📈 Open Issues Over Time</div>
              <div class="chart-wrapper"><canvas id="${repoId}-issues-chart"></canvas></div>
            </div>
            <div>
              <div class="chart-subtitle">🔀 Open Pull Requests Over Time</div>
              <div class="chart-wrapper"><canvas id="${repoId}-prs-chart"></canvas></div>
            </div>
          </div>
          ${d.commit_weeks?.length ? `
          <div style="margin-top:1.25rem">
            <div class="chart-subtitle">📦 Commits Per Week</div>
            <div class="chart-wrapper"><canvas id="${repoId}-commits-chart"></canvas></div>
          </div>` : ''}
        </div>
      </div>
    `);

    pendingCharts[repoId] = { repo, d };
  }

  // Restore saved tab, or default to first
  const saved = localStorage.getItem('epic-dashboard-tab');
  const ids   = repos.map(([r]) => r.replace(/\//g, '-'));
  activateTab(ids.includes(saved) ? saved : ids[0]);
}

function buildChart(canvasId, data, key) {
  const entries = Object.entries(data);
  if (!entries.length || !entries[0][1].dates?.length) return;
  const labels = entries[0][1].dates.map(fmtDate);
  const datasets = entries.map(([repo, d]) => ({
    label: repo,
    data: d[key],
    borderColor: REPO_COLORS[repo] || '#58a6ff',
    backgroundColor: (REPO_COLORS[repo] || '#58a6ff') + '18',
    fill: true,
    tension: 0,
    pointRadius: 2,
    pointHoverRadius: 5,
    borderWidth: 2,
  }));
  new Chart(document.getElementById(canvasId), {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { labels: { color: '#e6edf3', boxWidth: 14 } } },
      scales: SCALE_OPTS,
    },
  });
}

function buildCommitsChart(canvasId, repo, d) {
  const color = REPO_COLORS[repo] || '#58a6ff';
  new Chart(document.getElementById(canvasId), {
    type: 'bar',
    data: {
      labels: d.commit_weeks.map(fmtDate),
      datasets: [{
        label: 'Commits',
        data: d.commits_per_week,
        backgroundColor: color + '99',
        borderColor: color,
        borderWidth: 1,
        borderRadius: 3,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { labels: { color: '#e6edf3', boxWidth: 14 } } },
      scales: SCALE_OPTS,
    },
  });
}

(async () => {
  try {
    const resp = await fetch(`data/dashboard.json?t=${Date.now()}`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();

    const firstRepo = Object.values(data)[0];
    const hasDates = firstRepo?.dates?.length > 0;

    if (!hasDates) {
      document.getElementById('charts-container').innerHTML = `
        <div class="error-box">
          Dashboard data has not been generated yet.<br>
          Check the <strong>Actions</strong> tab of this repository — the
          <em>Update Dashboard Data</em> workflow should be running or scheduled.
        </div>`;
      return;
    }

    buildDashboard(data);

    if (firstRepo.updated_at) {
      document.getElementById('footer').textContent =
        `Last updated: ${new Date(firstRepo.updated_at).toLocaleString()}`;
    }
  } catch (e) {
    document.getElementById('charts-container').innerHTML =
      `<div class="error-box">Failed to load data/dashboard.json: ${e.message}</div>`;
  }
})();
</script>
</body>
</html>
